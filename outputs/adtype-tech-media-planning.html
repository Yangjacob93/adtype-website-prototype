<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공간 분석·미디어 플래닝 | Adtype OOH Growth System</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    :root {
      --ad: #eb4200;
      --ink: #151515;
      --ink-2: #343434;
      --muted: #6f747b;
      --line: #e2e2e2;
      --paper: #f7f7f7;
      --white: #ffffff;
      --max: 1280px;
      --pad: 32px;
      --radius: 6px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--paper); }
    body {
      color: var(--ink);
      font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      word-break: keep-all;
    }
    a { color: inherit; text-decoration: none; }
    h1, p { margin: 0; }
    img, video { display: block; max-width: 100%; }

    .page {
      min-height: 80vh;
      overflow-x: hidden;
      background: var(--paper);
    }

    .wrap {
      width: min(var(--max), calc(100% - (var(--pad) * 2)));
      margin: 0 auto;
    }

    .nav {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 40;
      background: transparent;
      border-bottom: 0;
      backdrop-filter: none;
    }
    .nav__inner {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }
    .brand {
      width: 106px;
      height: 30px;
      display: inline-flex;
      align-items: center;
    }
    .brand img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .nav__links {
      display: flex;
      align-items: center;
      gap: 26px;
      color: rgba(255,255,255,.78);
      font-size: 14px;
      line-height: 1;
      font-weight: 500;
    }
    .nav__cta {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(255,255,255,.72);
      border-radius: var(--radius);
      padding: 0 14px;
      color: #fff;
      background: rgba(255,255,255,.06);
    }

    .hero {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 96px 0 64px;
      position: relative;
      overflow: hidden;
      color: #fff;
      background: #080808;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(0,0,0,.58) 0%, rgba(0,0,0,.72) 48%, rgba(0,0,0,.80) 100%),
        linear-gradient(90deg, rgba(0,0,0,.30), rgba(0,0,0,.18), rgba(0,0,0,.30));
      pointer-events: none;
    }
    .hero__bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 50%;
      filter: saturate(.98) contrast(1.04);
    }
    .hero__copy {
      position: relative;
      z-index: 2;
      width: min(1040px, calc(100% - 48px));
      margin: 0 auto;
      padding: 58px 0 24px;
      text-align: center;
    }
    .hero__index {
      display: block;
      margin-bottom: 16px;
      color: rgba(255,255,255,.76);
      font-size: 18px;
      line-height: 1;
      font-weight: 520;
      letter-spacing: .02em;
      text-shadow: 0 12px 36px rgba(0,0,0,.34);
    }
    h1 {
      max-width: none;
      color: #fff;
      font-size: clamp(42px, 4.5vw, 64px);
      line-height: 1.05;
      font-weight: 560;
      letter-spacing: 0;
      text-shadow: 0 18px 58px rgba(0,0,0,.42);
    }
    .hero__subcopy {
      max-width: 1040px;
      margin: 24px auto 0;
      color: rgba(255,255,255,.88);
      font-size: clamp(16px, 1.18vw, 18px);
      line-height: 1.66;
      font-weight: 400;
      text-shadow: 0 12px 42px rgba(0,0,0,.36);
    }
    .mobile-break {
      display: none;
    }

    @media (max-width: 980px) {
      :root { --pad: 22px; }
      .nav__links a:not(.nav__cta) { display: none; }
      .hero {
        min-height: auto;
        padding: 96px 0 58px;
      }
      .hero__copy {
        width: min(100% - 44px, 720px);
        padding: 78px 0 46px;
      }
      h1 {
        font-size: clamp(42px, 11vw, 64px);
      }
    }

    @media (max-width: 560px) {
      .nav__inner { height: 62px; }
      .brand { width: 96px; }
      .hero {
        min-height: 640px;
        padding-top: 82px;
      }
      .hero__copy {
        width: min(100% - 36px, 390px);
        padding: 80px 0 36px;
      }
      .hero__index {
        margin-bottom: 12px;
        font-size: 15px;
        color: rgba(255,255,255,.70);
      }
      h1 {
        font-size: clamp(34px, 8.9vw, 40px);
        line-height: 1.12;
      }
      .mobile-break {
        display: block;
      }
      .hero__subcopy {
        margin-top: 20px;
        color: rgba(255,255,255,.68);
        font-size: 14px;
        line-height: 1.72;
        text-shadow: 0 10px 32px rgba(0,0,0,.32);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <nav class="nav" aria-label="Adtype">
      <div class="wrap nav__inner">
        <a class="brand" href="./adtype-for-brands.html" aria-label="Adtype 홈으로 이동">
          <img src="./assets/adtype-logo-white-crop.png" alt="Adtype" />
        </a>
        <div class="nav__links">
          <a href="./adtype-for-brands.html#technology">System</a>
          <a href="./adtype-for-brands.html#process">Process</a>
          <a class="nav__cta" href="./adtype-for-brands.html#contact">문의하기</a>
        </div>
      </div>
    </nav>

    <header class="hero" id="top">
      <video
        class="hero__bg"
        src="./assets/landing-page-assets/videos/product-adtype-intelligence-map.mp4"
        autoplay
        muted
        loop
        playsinline
        aria-hidden="true"
      ></video>

      <div class="hero__copy">
        <span class="hero__index">03.</span>
        <h1>공간 분석·<br class="mobile-break" />미디어 플래닝</h1>
        <p class="hero__subcopy">
          타겟이 생활하는 공간과 주요 접점을 분석해,<br />
          캠페인 목표에 맞는 미디어 믹스를 설계합니다.
        </p>
      </div>
    </header>
  </main>
</body>
</html>
